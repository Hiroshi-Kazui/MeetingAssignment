name: Release build (Windows / macOS)

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  # 同一バージョンを何度もビルドしても衝突しないよう、ビルド前に
  # 既存の下書きリリース(同一タグ)を削除してアセットをまっさらにする。
  cleanup-draft:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: delete existing draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(node -pe "require('./app/src-tauri/tauri.conf.json').version")
          TAG="app-v${VERSION}"
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Deleting existing draft release $TAG"
            gh release delete "$TAG" --repo "$GITHUB_REPOSITORY" --yes
          else
            echo "No existing release $TAG"
          fi

  publish-tauri:
    needs: cleanup-draft
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target universal-apple-darwin'
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: install frontend dependencies
        run: npm install
        working-directory: app

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: app
          tagName: app-v__VERSION__
          releaseName: '週日の集会割当 v__VERSION__'
          releaseBody: 'インストーラーは Assets からダウンロードしてください。\n- Windows: `*_x64-setup.exe`\n- macOS: `*.dmg`'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
