<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>S2 成員マスター管理 — 週日の集会 割り当てツール</title>
<link rel="stylesheet" href="assets/style.css">
</head>
<body>
<main>
  <h1>成員マスター管理</h1>
  <p class="page-desc">成員の登録・編集と、ロール／ロールグループの付与。成員は削除せず「状態」の変更で候補から外します（過去履歴は変わりません）。（S2 / 要件定義 §4.1）</p>

  <div class="toolbar">
    <div>
      <label>状態</label>
      <select id="f-status">
        <option value="active" selected>在籍のみ</option>
        <option value="all">すべて</option>
      </select>
    </div>
    <div>
      <label>ロール</label>
      <select id="f-role"><option value="">（すべて）</option></select>
    </div>
    <div>
      <label>氏名検索</label>
      <input type="search" id="f-name" placeholder="部分一致">
    </div>
    <span class="spacer"></span>
    <button class="btn btn-primary" id="add">＋ 成員を登録</button>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr><th>氏名</th><th>性別</th><th>状態</th><th>保持ロール（グループ由来含む）</th><th></th></tr>
      </thead>
      <tbody id="rows"></tbody>
    </table>
  </div>
</main>

<!-- 登録・編集ダイアログ -->
<dialog id="edit-dialog">
  <h3 id="dlg-title">成員を登録</h3>
  <div class="field">
    <label>氏名（フルネーム）</label>
    <input type="text" id="e-name" style="width:100%" placeholder="例: 山田 健一">
  </div>
  <div class="field field-row">
    <div>
      <label>性別</label>
      <select id="e-gender"><option value="M">男</option><option value="F">女</option></select>
    </div>
    <div>
      <label>状態</label>
      <select id="e-status">
        <option value="active">在籍</option>
        <option value="inactive">非活動・転出</option>
      </select>
    </div>
  </div>
  <div class="field">
    <label>ロールグループ（一括付与 — 選ぶと内包ロールがまとめて有効になります）</label>
    <div class="checks" id="e-groups"></div>
  </div>
  <div class="field">
    <label>個別ロール（グループに加えて個別に付与）</label>
    <div class="checks" id="e-roles"></div>
  </div>
  <div class="dialog-actions">
    <button class="btn" id="e-cancel">キャンセル</button>
    <button class="btn btn-primary" id="e-save">保存</button>
  </div>
</dialog>

<script src="assets/data.js"></script>
<script src="assets/common.js"></script>
<script>
renderSidebar("members");

// フィルタのロール選択肢
document.getElementById("f-role").innerHTML +=
  ROLES.map((r) => `<option value="${r.id}">${r.name}</option>`).join("");

let editing = null; // 編集対象の member（null = 新規）

function render() {
  const st = document.getElementById("f-status").value;
  const rid = document.getElementById("f-role").value;
  const q = document.getElementById("f-name").value.trim();
  const list = MEMBERS.filter(
    (m) =>
      (st === "all" || m.status === st) &&
      (!rid || memberHasRole(m, rid)) &&
      (!q || m.name.includes(q))
  );
  document.getElementById("rows").innerHTML = list
    .map((m) => {
      const roles = memberRoleIds(m).map((id) => byId(ROLES, id)?.name).join("、");
      const groups = m.roleGroupIds.map((id) => `<span class="badge badge-blue">${byId(ROLE_GROUPS, id)?.name}</span>`).join(" ");
      return `<tr class="${m.status === "inactive" ? "row-muted" : ""}">
        <td>${m.name}</td>
        <td>${m.gender === "M" ? "男" : "女"}</td>
        <td>${m.status === "active" ? '<span class="badge badge-green">在籍</span>' : '<span class="badge badge-gray">非活動・転出</span>'}</td>
        <td>${groups} <span style="font-size:13px;color:var(--muted)">${roles}</span></td>
        <td><button class="btn btn-sm" onclick="openEdit('${m.id}')">編集</button></td>
      </tr>`;
    })
    .join("") || `<tr><td colspan="5" style="color:var(--muted)">該当する成員がいません</td></tr>`;
}

["f-status", "f-role", "f-name"].forEach((id) => {
  document.getElementById(id).addEventListener("input", render);
});

const dlg = document.getElementById("edit-dialog");

function openEdit(id) {
  editing = id ? byId(MEMBERS, id) : null;
  document.getElementById("dlg-title").textContent = editing ? `${editing.name} を編集` : "成員を登録";
  document.getElementById("e-name").value = editing?.name ?? "";
  document.getElementById("e-gender").value = editing?.gender ?? "M";
  document.getElementById("e-status").value = editing?.status ?? "active";
  document.getElementById("e-groups").innerHTML = ROLE_GROUPS.map(
    (g) => `<label><input type="checkbox" value="${g.id}" ${editing?.roleGroupIds.includes(g.id) ? "checked" : ""}> ${g.name}</label>`
  ).join("");
  document.getElementById("e-roles").innerHTML = ROLES.map(
    (r) => `<label><input type="checkbox" value="${r.id}" ${editing?.roleIds.includes(r.id) ? "checked" : ""}> ${r.name}</label>`
  ).join("");
  dlg.showModal();
}
document.getElementById("add").onclick = () => openEdit(null);
document.getElementById("e-cancel").onclick = () => dlg.close();

document.getElementById("e-save").onclick = () => {
  const name = document.getElementById("e-name").value.trim();
  if (!name) { alert("氏名を入力してください"); return; }
  const rec = editing ?? { id: "m" + (MEMBERS.length + 1).toString().padStart(2, "0"), roleIds: [], roleGroupIds: [] };
  rec.name = name;
  rec.gender = document.getElementById("e-gender").value;
  rec.status = document.getElementById("e-status").value;
  rec.roleGroupIds = [...document.querySelectorAll("#e-groups input:checked")].map((c) => c.value);
  rec.roleIds = [...document.querySelectorAll("#e-roles input:checked")].map((c) => c.value);
  if (!editing) MEMBERS.push(rec);
  dlg.close();
  render();
};

render();
</script>
</body>
</html>
